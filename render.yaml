services:
  - type: web
    name: anti-detection-fb-automation
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: |
      pip install -r requirements.txt
      python -m playwright install chromium
    startCommand: python telegram_bot.py
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: .playwright
      - key: HEADLESS
        value: "true"
      - key: AIOHTTP_CLIENT_MAX_SIZE
        value: "33554432"
      - key: TELEGRAM_UPLOAD_DIR
        value: artifacts/telegram_uploads
      - key: AUTO_SET_TELEGRAM_WEBHOOK
        value: "true"
      - key: TELEGRAM_DROP_PENDING_UPDATES
        value: "false"
      - key: AUTO_INIT_DB
        value: "true"
      - key: DELETE_COOKIE_MESSAGES
        value: "true"
      - key: BOT_ACCOUNT_COOKIE_COOLDOWN_SECONDS
        value: "360"
      - key: BOT_ACCOUNT_LOCK_LEASE_SECONDS
        value: "1800"
      - key: BOT_ACCOUNT_LOCK_MAX_WAIT_SECONDS
        value: "3600"
      - key: BOT_ACCOUNT_LOCK_POLL_SECONDS
        value: "10"
      - key: BOT_ACCOUNT_LOCK_HEARTBEAT_SECONDS
        value: "30"
      - key: BOT_DASHBOARD_SESSION_TTL_SECONDS
        value: "1800"
      - key: POST_COOKIE_MIN_INTERVAL_SECONDS
        value: "360"
      - key: POST_COOKIE_SESSION_LOCK_ENABLED
        value: "true"
      - key: POST_COOKIE_SESSION_LOCK_WAIT_SECONDS
        value: "900"
      - key: POST_COOKIE_SESSION_LOCK_TTL_SECONDS
        value: "1800"
      - key: POST_ENABLE_PAGES_PORTAL_FALLBACK
        value: "true"
      - key: POST_PAGES_PORTAL_FALLBACK_IMAGE_ENABLED
        value: "true"
      - key: POST_PAGES_PORTAL_FALLBACK_VIDEO_ENABLED
        value: "true"
      - key: POST_PAGES_PORTAL_FIRST
        value: "true"
      - key: POST_PAGES_PORTAL_FIRST_IMAGE_ENABLED
        value: "true"
      - key: POST_PAGES_PORTAL_FIRST_VIDEO_ENABLED
        value: "true"
      - key: FACEBOOK_BROWSER_NO_SANDBOX
        value: "true"
      - key: FACEBOOK_IMAGE_FORCE_SANITIZE_UPLOAD
        value: "true"
      - key: FACEBOOK_IMAGE_PREFER_JPEG_UPLOAD
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        value: REPLACE_ME_TELEGRAM_BOT_TOKEN
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: BOT_ADMIN_IDS
        value: "123456789"
      - key: DATABASE_URL
        value: postgresql://replace_me:replace_me@replace-me.supabase.co:5432/postgres
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        value: https://replace-me.onrender.com
