services:
  - type: web
    name: anti-detection-fb-automation
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: |
      pip install -r requirements.txt
      python -m playwright install chromium
    startCommand: python telegram_bot.py
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: SUPPRESS_HEALTHZ_ACCESS_LOGS
        value: "true"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: .playwright
      - key: HEADLESS
        value: "true"
      - key: AIOHTTP_CLIENT_MAX_SIZE
        value: "33554432"
      - key: TELEGRAM_UPLOAD_DIR
        value: artifacts/telegram_uploads
      - key: AUTO_SET_TELEGRAM_WEBHOOK
        value: "true"
      - key: TELEGRAM_DROP_PENDING_UPDATES
        value: "false"
      - key: AUTO_INIT_DB
        value: "true"
      - key: RESTART_BROADCAST_ENABLED
        value: "true"
      - key: DELETE_COOKIE_MESSAGES
        value: "true"
      - key: BOT_ACCOUNT_COOKIE_COOLDOWN_SECONDS
        value: "0"
      - key: BOT_ACCOUNT_LOCK_LEASE_SECONDS
        value: "1800"
      - key: BOT_ACCOUNT_LOCK_MAX_WAIT_SECONDS
        value: "3600"
      - key: BOT_ACCOUNT_LOCK_POLL_SECONDS
        value: "10"
      - key: BOT_ACCOUNT_LOCK_HEARTBEAT_SECONDS
        value: "30"
      - key: BOT_RELEASE_ACCOUNT_LOCKS_ON_STARTUP
        value: "true"
      - key: BOT_ACCOUNT_LOCK_STALE_SECONDS
        value: "90"
      - key: BOT_ALLOW_ACCOUNT_OWNERSHIP_TRANSFER
        value: "true"
      - key: BOT_DASHBOARD_SESSION_TTL_SECONDS
        value: "1800"
      - key: BOT_PROGRESS_EDIT_MIN_SECONDS
        value: "1.5"
      - key: BOT_PROGRESS_HEARTBEAT_SECONDS
        value: "8"
      - key: BOT_TELEGRAM_API_TIMEOUT_SECONDS
        value: "30"
      - key: BOT_PAGE_DISCOVERY_TIMEOUT_SECONDS
        value: "150"
      - key: BOT_ACCOUNT_ADD_PAGE_DISCOVERY_TIMEOUT_SECONDS
        value: "150"
      - key: BOT_POSTING_ENGINE_TIMEOUT_SECONDS
        value: "900"
      - key: BOT_BATCH_POSTING_ENGINE_TIMEOUT_SECONDS
        value: "3600"
      - key: BOT_VIDEO_URL_PROBE_TIMEOUT_SECONDS
        value: "12"
      - key: BOT_ACCOUNT_NAME_LOOKUP_TIMEOUT_SECONDS
        value: "45"
      - key: FACEBOOK_BROWSER_ACCOUNT_LOOKUP_FALLBACK_ENABLED
        value: "true"
      - key: POST_BATCH_PAGE_TIMEOUT_SECONDS
        value: "180"
      - key: POST_BATCH_PAGE_TIMEOUT_MAX_SECONDS
        value: "300"
      - key: POST_DIRECT_COMPOSER_TIMEOUT_SECONDS
        value: "45"
      - key: POST_BATCH_HOME_WAIT_UNTIL
        value: "commit"
      - key: POST_BATCH_HOME_READY_TIMEOUT_MS
        value: "2000"
      - key: POST_BATCH_HOME_NETWORK_IDLE_TIMEOUT_MS
        value: "0"
      - key: POST_PAGES_PORTAL_TEXT_TIMEOUT_SECONDS
        value: "120"
      - key: POST_PAGES_PORTAL_IMAGE_TIMEOUT_SECONDS
        value: "180"
      - key: POST_PAGES_PORTAL_VIDEO_TIMEOUT_SECONDS
        value: "240"
      - key: POST_PUBLISH_IN_PROGRESS_TIMEOUT_MS
        value: "15000"
      - key: POST_ACCEPT_POST_PUBLISH_POPUP_AS_SUCCESS
        value: "true"
      - key: POST_PROFILE_SWITCH_SETTLE_GRACE_SECONDS
        value: "3"
      - key: POST_PROFILE_SWITCH_FAST_SETTLE_TIMEOUT_MS
        value: "2500"
      - key: POST_PROFILE_SWITCH_FAST_SETTLE_GRACE_SECONDS
        value: "1"
      - key: POST_PROFILE_SWITCH_CONFIRM_TIMEOUT_MS
        value: "1200"
      - key: POST_INITIAL_UI_CONFIRMATION_TIMEOUT_MS
        value: "3500"
      - key: POST_VIDEO_NETWORK_CONFIRMATION_TIMEOUT_MS
        value: "3500"
      - key: POST_COMPOSER_BUTTON_TIMEOUT_MS
        value: "5000"
      - key: POST_COMPOSER_DIALOG_TIMEOUT_MS
        value: "6500"
      - key: MEDIA_UPLOAD_READY_IMAGE_TIMEOUT
        value: "30"
      - key: MEDIA_UPLOAD_READY_VIDEO_TIMEOUT
        value: "120"
      - key: POST_PARALLEL_BATCH_ENABLED
        value: "true"
      - key: POST_ALLOW_PARALLEL_SAME_COOKIE
        value: "true"
      - key: POST_PARALLEL_SAME_COOKIE_MAX_CONTEXTS
        value: "4"
      - key: MAX_PARALLEL_PAGES
        value: "4"
      - key: POST_PARALLEL_SAME_COOKIE_STAGGER_SECONDS
        value: "0.5"
      - key: POST_PARALLEL_ENABLE_PAGES_PORTAL_FALLBACK
        value: "true"
      - key: POST_PARALLEL_PAGES_PORTAL_TEXT_TIMEOUT_SECONDS
        value: "60"
      - key: POST_PARALLEL_PAGES_PORTAL_IMAGE_TIMEOUT_SECONDS
        value: "90"
      - key: POST_PARALLEL_PAGES_PORTAL_VIDEO_TIMEOUT_SECONDS
        value: "120"
      - key: FACEBOOK_MEDIA_UPLOAD_MAX_ZERO_NETWORK_ATTEMPTS
        value: "2"
      - key: POST_COOKIE_MIN_INTERVAL_SECONDS
        value: "0"
      - key: POST_COOKIE_SECURITY_COOLDOWN_SECONDS
        value: "86400"
      - key: POST_COOKIE_SESSION_LOCK_ENABLED
        value: "true"
      - key: POST_COOKIE_SESSION_LOCK_WAIT_SECONDS
        value: "900"
      - key: POST_COOKIE_SESSION_LOCK_TTL_SECONDS
        value: "1800"
      - key: FB_AUTOMATION_ENABLE_PRIVATE_HTTP
        value: "false"
      - key: POST_ENABLE_PAGES_PORTAL_FALLBACK
        value: "false"
      - key: POST_PAGES_PORTAL_FALLBACK_TEXT_ENABLED
        value: "false"
      - key: POST_PAGES_PORTAL_FALLBACK_IMAGE_ENABLED
        value: "false"
      - key: POST_PAGES_PORTAL_FALLBACK_VIDEO_ENABLED
        value: "false"
      - key: POST_PAGES_PORTAL_FIRST
        value: "false"
      - key: POST_PAGES_PORTAL_FIRST_TEXT_ENABLED
        value: "false"
      - key: POST_PAGES_PORTAL_FIRST_IMAGE_ENABLED
        value: "false"
      - key: POST_PAGES_PORTAL_FIRST_VIDEO_ENABLED
        value: "false"
      - key: FACEBOOK_BROWSER_NO_SANDBOX
        value: "true"
      - key: FACEBOOK_IMAGE_FORCE_SANITIZE_UPLOAD
        value: "true"
      - key: FACEBOOK_IMAGE_PREFER_JPEG_UPLOAD
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: BOT_ADMIN_IDS
        sync: false
      - key: BOT_REQUIRE_USER_APPROVAL
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
